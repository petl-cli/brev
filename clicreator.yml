      send-campaign-report: "post /smsCampaigns/{campaignId}/sendReport"
  deals:
    methods:
      get-pipeline-stages: "get /crm/pipeline/details"
      get-details: "get /crm/pipeline/details/{pipelineID}"
      get-all-pipelines: "get /crm/pipeline/details/all"
      get-attributes: "get /crm/attributes/deals"
      get-all-deals: "get /crm/deals"
      create-new-deal: "post /crm/deals"
      get-by-id: "get /crm/deals/{id}"
      delete-deal: "delete /crm/deals/{id}"
      update-deal-by-id: "patch /crm/deals/{id}"
      link-unlink-patch: "patch /crm/deals/link-unlink/{id}"
  whatsapp-campaigns:
    methods:
      get-campaign-by-id: "get /whatsappCampaigns/{campaignId}"
      update-campaign-by-id: "put /whatsappCampaigns/{campaignId}"
      delete-campaign: "delete /whatsappCampaigns/{campaignId}"
      get-templates: "get /whatsappCampaigns/template-list"
      get-all: "get /whatsappCampaigns"
      create-and-send: "post /whatsappCampaigns"
      create-template: "post /whatsappCampaigns/template"
      send-template-for-approval: "post /whatsappCampaigns/template/approval/{templateId}"
      get-account-info: "get /whatsappCampaigns/config"
  conversations:
