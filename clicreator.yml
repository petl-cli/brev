cli:
  name: brevo-api
  env_prefix: BREVO_API
  version: "0.1.0"

environments:
  production: https://api.brevo.com/v3

security_schemes:
  api-key:
    type: apiKey
    in: header
    name: api-key

security:
  - api-key: []

client_settings:
  opts:
    api_key:
      type: string
      read_env: BREVO_API_API_KEY
      auth:
        security_scheme: api-key

resources:
  contacts:
    methods:
      get-all-contacts: "get /contacts"
      create-new-contact: "post /contacts"
      create-double-opt-in-contact: "post /contacts/doubleOptinConfirmation"
      get-details: "get /contacts/{identifier}"
      update-contact-by-id: "put /contacts/{identifier}"
      delete-contact: "delete /contacts/{identifier}"
      update-multiple: "post /contacts/batch"
      get-email-campaign-stats: "get /contacts/{identifier}/campaignStats"
      list-attributes: "get /contacts/attributes"
      create-attribute: "post /contacts/attributes/{attributeCategory}/{attributeName}"
      update-attribute: "put /contacts/attributes/{attributeCategory}/{attributeName}"
      remove-attribute: "delete /contacts/attributes/{attributeCategory}/{attributeName}"
      get-all-folders: "get /contacts/folders"
      create-folder: "post /contacts/folders"
      get-folder-details: "get /contacts/folders/{folderId}"
      update-folder: "put /contacts/folders/{folderId}"
      delete-folder: "delete /contacts/folders/{folderId}"
      get-folder-lists: "get /contacts/folders/{folderId}/lists"
      get-all-lists: "get /contacts/lists"
      create-list: "post /contacts/lists"
      get-list-details: "get /contacts/lists/{listId}"
      update-list: "put /contacts/lists/{listId}"
      delete-list: "delete /contacts/lists/{listId}"
      get-all-segments: "get /contacts/segments"
      get-list-contacts: "get /contacts/lists/{listId}/contacts"
      add-to-list: "post /contacts/lists/{listId}/contacts/add"
      remove-contact-from-list: "post /contacts/lists/{listId}/contacts/remove"
      export-process-id: "post /contacts/export"
      import-contacts-process: "post /contacts/import"
  master-account:
    methods:
      account-get-user-activity-logs: "get /organization/activities"
      list-sub-accounts: "get /corporate/subAccount"
      create-sub-account: "post /corporate/subAccount"
      get-sub-account-details: "get /corporate/subAccount/{id}"
      delete-sub-account: "delete /corporate/subAccount/{id}"
      update-sub-account-plan: "put /corporate/subAccount/{id}/plan"
      master-account-generate-sso-token: "post /corporate/ssoToken"
      post-master-account-generate-sso-token: "post /corporate/subAccount/ssoToken"
      get-details: "get /corporate/masterAccount"
      create-sub-account-key: "post /corporate/subAccount/key"
      enable-disable: "put /corporate/subAccount/{id}/applications/toggle"
      create-group-of-sub-accounts: "post /corporate/group"
      get-group-details: "get /corporate/group/{id}"
      update-group-sub-accounts: "put /corporate/group/{id}"
      delete-group: "delete /corporate/group/{id}"
      unlink-sub-account-from-group: "put /corporate/group/unlink/{groupId}/subAccounts"
      send-invitation-to-admin-user: "post /corporate/user/invitation/send"
      resend-cancel-admin-user-invitation: "put /corporate/user/invitation/{action}/{email}"
      revoke-admin-user: "delete /corporate/user/revoke/{email}"
      list-admin-users: "get /corporate/invited/users"
      check-admin-user-permissions: "get /corporate/user/{email}/permissions"
      list-groups: "get /corporate/groups"
  transactional-emails:
    methods:
      send-transactional-email: "post /smtp/email"
      get-list: "get /smtp/emails"
      get-content-by-uuid: "get /smtp/emails/{uuid}"
      delete-log: "delete /smtp/log/{identifier}"
      list-templates: "get /smtp/templates"
      create-template: "post /smtp/templates"
      get-template-info: "get /smtp/templates/{templateId}"
      update-template: "put /smtp/templates/{templateId}"
      delete-template-by-id: "delete /smtp/templates/{templateId}"
      send-test-template: "post /smtp/templates/{templateId}/sendTest"
      get-aggregated-report: "get /smtp/statistics/aggregatedReport"
      get-activity-per-day: "get /smtp/statistics/reports"
      get-all-activity: "get /smtp/statistics/events"
      unblock-contact: "delete /smtp/blockedContacts/{email}"
      list-blocked-contacts: "get /smtp/blockedContacts"
      get-blocked-domains: "get /smtp/blockedDomains"
      add-blocked-domain: "post /smtp/blockedDomains"
      unblock-domain: "delete /smtp/blockedDomains/{domain}"
      remove-hardbounces: "post /smtp/deleteHardbounces"
      get-email-status-by-id: "get /smtp/emailStatus/{identifier}"
      delete-scheduled-emails: "delete /smtp/email/{identifier}"
  reseller:
