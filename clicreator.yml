      update-campaign-by-id: "put /smsCampaigns/{campaignId}"
      remove-campaign-by-id: "delete /smsCampaigns/{campaignId}"
      send-immediately: "post /smsCampaigns/{campaignId}/sendNow"
      update-status: "put /smsCampaigns/{campaignId}/status"
      send-test-sms: "post /smsCampaigns/{campaignId}/sendTest"
