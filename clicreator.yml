      add-child-credits: "post /reseller/children/{childIdentifier}/credits/add"
      remove-credits-from-child: "post /reseller/children/{childIdentifier}/credits/remove"
      get-child-domains: "get /reseller/children/{childIdentifier}/domains"
      create-child-domain: "post /reseller/children/{childIdentifier}/domains"
      update-sender-domain: "put /reseller/children/{childIdentifier}/domains/{domainName}"
      delete-sender-domain-by-child-identifier-and-domain-name: "delete /reseller/children/{childIdentifier}/domains/{domainName}"
      get-session-token: "get /reseller/children/{childIdentifier}/auth"
  ecommerce:
    methods:
      activate-app: "post /ecommerce/activate"
      ecommerce-get-attribution-metrics: "get /ecommerce/attribution/metrics"
      get-ecommerce-get-attribution-metrics: "get /ecommerce/attribution/metrics/{conversionSource}/{conversionSourceId}"
      get-attributed-product-sales: "get /ecommerce/attribution/products/{conversionSource}/{conversionSourceId}"
      get-orders: "get /orders"
      manage-order-status: "post /orders/status"
      create-order-batch: "post /orders/status/batch"
      get-all-categories: "get /categories"
      create-category: "post /categories"
      get-category-details: "get /categories/{id}"
      create-categories-batch: "post /categories/batch"
      list-all-products: "get /products"
      create-product: "post /products"
